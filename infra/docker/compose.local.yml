name: verae-local

services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: verae
      POSTGRES_USER: verae
      POSTGRES_PASSWORD: verae
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["local_postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verae -d verae"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: verae-local
      MINIO_ROOT_PASSWORD: verae-local-secret
    ports: ["127.0.0.1:9000:9000", "127.0.0.1:9001:9001"]
    volumes: ["local_objects:/data"]

  clamav:
    image: clamav/clamav:1.4
    ports: ["127.0.0.1:3310:3310"]
    volumes: ["local_clamav:/var/lib/clamav"]

volumes:
  local_postgres:
  local_objects:
  local_clamav:
