name: verae-production

# AWS Lightsail production stack. PostgreSQL is NOT run here: production uses
# the Lightsail managed database (automated backups, point-in-time restore,
# patching). The pgBackRest/systemd backup machinery from the IPServerOne
# setup is intentionally absent.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks: [edge]
    logging: *default-logging

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../server/.env.production
    volumes:
      - /etc/verae/aws-rds-global-bundle.pem:/etc/ssl/certs/aws-rds-global-bundle.pem:ro
    expose: ["4000"]
    command: ["node", "server/dist/index.js"]
    depends_on:
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [edge]
    logging: *default-logging

  tools:
    profiles: ["tools"]
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file: ../../server/.env.production
    environment:
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
    volumes:
      - /etc/verae/aws-rds-global-bundle.pem:/etc/ssl/certs/aws-rds-global-bundle.pem:ro
    command: ["node", "server/dist/db/migrate.js"]
    networks: [edge]
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../server/.env.production
    environment:
      PROCESS_ROLE: worker
    volumes:
      - /etc/verae/aws-rds-global-bundle.pem:/etc/ssl/certs/aws-rds-global-bundle.pem:ro
    command: ["node", "server/dist/worker.js"]
    depends_on:
      clamav:
        condition: service_started
    networks: [edge]
    logging: *default-logging

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    expose: ["3310"]
    volumes:
      - clamav_signatures:/var/lib/clamav
    # No host port is published, so clamd remains private to the compose
    # network. The edge network provides outbound access for FreshClam
    # signature updates.
    networks: [edge]
    logging: *default-logging

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
  clamav_signatures:
