name: verae-staging

# AWS Lightsail staging stack (serves api-uat.veraehealth.com). Runs the same
# services as production PLUS a local PostgreSQL container. Staging holds
# invented data only — never real member data — so a container database with
# no backup pipeline is acceptable here.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks: [edge]
    logging: *default-logging

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../server/.env.staging
    expose: ["4000"]
    command: ["node", "server/dist/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [edge]
    logging: *default-logging

  tools:
    profiles: ["tools"]
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file: ../../server/.env.staging
    environment:
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
    command: ["node", "server/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../server/.env.staging
    environment:
      PROCESS_ROLE: worker
    command: ["node", "server/dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_started
    networks: [edge]
    logging: *default-logging

  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verae}
      POSTGRES_USER: ${POSTGRES_USER:-verae_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [edge]
    logging: *default-logging

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    expose: ["3310"]
    volumes:
      - clamav_signatures:/var/lib/clamav
    networks: [edge]
    logging: *default-logging

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
  clamav_signatures:
  staging_postgres_data:
