<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Verae Health is a doctor-led preventive health program for Malaysians who want to understand their health before it becomes urgent."
    />
    <title>Verae Health | Know your health before it becomes urgent</title>
    <script>
      // Supabase auth links (email confirmation, OAuth) can land on the site
      // root when the redirect target falls back to the Site URL. The landing
      // bundle has no Supabase client, so forward auth callbacks to the
      // portal, which does. Keep this before the app script.
      (function () {
        var params = window.location.search + window.location.hash;
        if (/[?&#](code|access_token|token_hash|error_code|type)=/.test(params)) {
          window.location.replace("/member" + window.location.search + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="landing-root"></div>
    <script type="module" src="/src/landing/main.tsx"></script>
  </body>
</html>
